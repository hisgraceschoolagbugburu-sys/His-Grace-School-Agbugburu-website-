<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administrator Access | His Grace School Agbugburu</title>
  
  <meta name="description" content="Secure Administrator Portal for His Grace School Agbugburu management and operations.">
  
  <link rel="stylesheet" href="css/style.css">

  <style>
    .admin-login-body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background-color: #0F172A;
      background-image: 
        radial-gradient(at 0% 0%, rgba(18, 62, 124, 0.4) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(212, 175, 55, 0.2) 0px, transparent 50%),
        radial-gradient(at 50% 50%, rgba(18, 62, 124, 0.25) 0px, transparent 100%);
      font-family: 'Poppins', sans-serif;
    }

    .admin-login-card {
      background: #FFFFFF;
      border-radius: 20px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.35);
      width: 100%;
      max-width: 460px;
      overflow: hidden;
      position: relative;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .admin-login-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(90deg, #123E7C 0%, #D4AF37 50%, #123E7C 100%);
    }

    .admin-card-header {
      padding: 2.5rem 2.25rem 1.75rem 2.25rem;
      text-align: center;
      background: linear-gradient(180deg, #F8FAFC 0%, #FFFFFF 100%);
      border-bottom: 1px solid #F1F5F9;
    }

    .admin-crest-wrapper {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid #D4AF37;
      padding: 4px;
      background: #FFFFFF;
      margin: 0 auto 1.25rem auto;
      box-shadow: 0 8px 20px rgba(18, 62, 124, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .admin-crest-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 50%;
    }

    .admin-school-name {
      font-size: 0.85rem;
      font-weight: 700;
      color: #D4AF37;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 0.35rem;
    }

    .admin-portal-title {
      font-size: 1.65rem;
      font-weight: 800;
      color: #123E7C;
      margin-bottom: 0.25rem;
      letter-spacing: -0.02em;
    }

    .admin-portal-sub {
      font-size: 0.875rem;
      color: #64748B;
      font-weight: 400;
    }

    .admin-card-body {
      padding: 2.25rem;
    }

    .form-group {
      margin-bottom: 1.35rem;
    }

    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: #1E293B;
      margin-bottom: 0.5rem;
    }

    .input-icon-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: #64748B;
      pointer-events: none;
      transition: color 0.2s ease;
    }

    .form-input {
      width: 100%;
      padding: 0.85rem 1rem 0.85rem 2.85rem;
      font-family: 'Poppins', sans-serif;
      font-size: 0.925rem;
      border: 1.5px solid #CBD5E1;
      border-radius: 10px;
      color: #0F172A;
      background-color: #F8FAFC;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      box-sizing: border-box;
    }

    .form-input:focus {
      outline: none;
      border-color: #123E7C;
      background-color: #FFFFFF;
      box-shadow: 0 0 0 4px rgba(18, 62, 124, 0.1);
    }

    .form-input:focus + .input-icon,
    .form-input:focus ~ .input-icon {
      color: #123E7C;
    }

    .form-row-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.75rem;
      font-size: 0.85rem;
    }

    .remember-me-label {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: #475569;
      font-weight: 500;
      cursor: pointer;
    }

    .remember-me-label input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #123E7C;
      cursor: pointer;
    }

    .forgot-pass-btn {
      color: #123E7C;
      font-weight: 600;
      text-decoration: none;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
    }

    .forgot-pass-btn:hover {
      color: #D4AF37;
      text-decoration: underline;
    }

    .btn-submit-admin {
      width: 100%;
      padding: 0.95rem;
      background: #123E7C;
      color: #FFFFFF;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 0.975rem;
      letter-spacing: 0.5px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 8px 20px rgba(18, 62, 124, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-submit-admin:hover {
      background: #0A2852;
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(18, 62, 124, 0.35);
    }

    .admin-footer-link {
      text-align: center;
      margin-top: 1.5rem;
      padding-top: 1.25rem;
      border-top: 1px solid #F1F5F9;
      font-size: 0.825rem;
      color: #64748B;
    }

    .admin-footer-link a {
      color: #123E7C;
      font-weight: 600;
      text-decoration: none;
    }

    .admin-footer-link a:hover {
      color: #D4AF37;
    }

    /* Modal Styling */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      padding: 1rem;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-content {
      background: #FFFFFF;
      width: 100%;
      max-width: 440px;
      border-radius: 16px;
      padding: 2.25rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      position: relative;
    }

    .modal-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: #123E7C;
      margin-bottom: 0.5rem;
    }

    .modal-sub {
      font-size: 0.85rem;
      color: #64748B;
      line-height: 1.5;
      margin-bottom: 1.5rem;
    }

    .form-alert-box {
      padding: 0.85rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 1.25rem;
      display: none;
    }

    .form-alert-box.error {
      background: #FEE2E2;
      color: #991B1B;
      border: 1px solid #FCA5A5;
    }

    .form-alert-box.success {
      background: #D1FAE5;
      color: #065F46;
      border: 1px solid #6EE7B7;
    }
  </style>
</head>
<body class="admin-login-body">

  <div class="admin-login-card">
    <div class="admin-card-header">
      <div class="admin-crest-wrapper">
        <img src="assets/images/logo.png" alt="His Grace School Crest" class="admin-crest-img">
      </div>
      <div class="admin-school-name">His Grace School Agbugburu</div>
      <h1 class="admin-portal-title">Administrator Portal</h1>
      <p class="admin-portal-sub">Secure Management & Operations System</p>
    </div>

    <div class="admin-card-body">
      <div id="admin-login-alert" class="form-alert-box"></div>

      <form id="admin-login-form" autocomplete="off">
        <div class="form-group">
          <label for="admin-id" class="form-label">Administrator ID</label>
          <div class="input-icon-wrapper">
            <input 
              type="text" 
              id="admin-id" 
              class="form-input" 
              placeholder="e.g. HGS/ADM/2026" 
              required
              style="font-family: monospace; font-weight: 600; letter-spacing: 0.5px;"
            >
            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
          </div>
        </div>

        <div class="form-group">
          <label for="admin-password" class="form-label">Password</label>
          <div class="input-icon-wrapper">
            <input 
              type="password" 
              id="admin-password" 
              class="form-input" 
              placeholder="Enter your password" 
              required
            >
            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
          </div>
        </div>

        <div class="form-row-options">
          <label class="remember-me-label">
            <input type="checkbox" id="admin-remember" checked>
            Remember session
          </label>
          <button type="button" id="btn-admin-forgot" class="forgot-pass-btn">Forgot Password?</button>
        </div>

        <button type="submit" id="btn-admin-submit" class="btn-submit-admin">
          <span>Authenticate Admin Access</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        </button>
      </form>

      <div class="admin-footer-link">
        <a href="index.html">&larr; Return to Main Website</a>
      </div>
    </div>
  </div>

  <!-- Password Recovery Modal -->
  <div id="admin-reset-modal" class="modal-overlay">
    <div class="modal-content">
      <h3 class="modal-title">Administrator Password Reset</h3>
      <p class="modal-sub">Enter your Administrator ID to log a password reset request. Reset requests are forwarded to school administration for verification.</p>
      
      <div id="reset-alert" class="form-alert-box"></div>

      <div class="form-group">
        <label for="reset-admin-id" class="form-label">Administrator ID</label>
        <input type="text" id="reset-admin-id" class="form-input" placeholder="e.g. HGS/ADM/2026" style="padding-left: 1rem; font-family: monospace; font-weight: 600;">
      </div>

      <div style="display: flex; gap: 0.75rem; margin-top: 1.5rem;">
        <button type="button" id="btn-close-admin-modal" class="btn-submit-admin" style="background: #E2E8F0; color: #475569; box-shadow: none;">Cancel</button>
        <button type="button" id="btn-send-admin-reset" class="btn-submit-admin">Submit Reset</button>
      </div>
    </div>
  </div>

  <!-- App Scripts -->
  <script type="module" src="js/firebase.js"></script>
  <script type="module" src="js/session.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/admin-login.js"></script>
</body>
</html>
