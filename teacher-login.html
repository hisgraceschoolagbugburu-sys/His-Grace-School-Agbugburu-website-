<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Portal Access | His Grace School Agbugburu</title>
  
  <meta name="description" content="Teacher Portal Login for His Grace School Agbugburu staff members.">
  
  <link rel="stylesheet" href="css/style.css">

  <style>
    .teacher-login-body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background-color: #0F172A;
      background-image: 
        radial-gradient(at 0% 0%, rgba(18, 62, 124, 0.4) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(212, 175, 55, 0.2) 0px, transparent 50%);
      font-family: 'Poppins', sans-serif;
    }

    .teacher-login-card {
      background: #FFFFFF;
      border-radius: 20px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.35);
      width: 100%;
      max-width: 460px;
      overflow: hidden;
      position: relative;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .teacher-login-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(90deg, #123E7C 0%, #D4AF37 50%, #123E7C 100%);
    }

    .teacher-card-header {
      padding: 2.5rem 2.25rem 1.75rem 2.25rem;
      text-align: center;
      background: linear-gradient(180deg, #F8FAFC 0%, #FFFFFF 100%);
      border-bottom: 1px solid #F1F5F9;
    }

    .teacher-crest-wrapper {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid #D4AF37;
      padding: 4px;
      background: #FFFFFF;
      margin: 0 auto 1.25rem auto;
      box-shadow: 0 8px 20px rgba(18, 62, 124, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .teacher-crest-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 50%;
    }

    .teacher-school-name {
      font-size: 0.85rem;
      font-weight: 700;
      color: #D4AF37;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 0.35rem;
    }

    .teacher-portal-title {
      font-size: 1.65rem;
      font-weight: 800;
      color: #123E7C;
      margin-bottom: 0.25rem;
      letter-spacing: -0.02em;
    }

    .teacher-portal-sub {
      font-size: 0.875rem;
      color: #64748B;
      font-weight: 400;
    }

    .teacher-card-body {
      padding: 2.25rem;
    }

    .form-group {
      margin-bottom: 1.35rem;
    }

    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: #1E293B;
      margin-bottom: 0.5rem;
    }

    .input-icon-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: #64748B;
      pointer-events: none;
    }

    .form-input {
      width: 100%;
      padding: 0.85rem 1rem 0.85rem 2.85rem;
      font-family: 'Poppins', sans-serif;
      font-size: 0.925rem;
      border: 1.5px solid #CBD5E1;
      border-radius: 10px;
      color: #0F172A;
      background-color: #F8FAFC;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      box-sizing: border-box;
    }

    .form-input:focus {
      outline: none;
      border-color: #123E7C;
      background-color: #FFFFFF;
      box-shadow: 0 0 0 4px rgba(18, 62, 124, 0.1);
    }

    .form-row-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.75rem;
      font-size: 0.85rem;
    }

    .remember-me-label {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: #475569;
      font-weight: 500;
      cursor: pointer;
    }

    .remember-me-label input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #123E7C;
      cursor: pointer;
    }

    .forgot-pass-btn {
      color: #123E7C;
      font-weight: 600;
      text-decoration: none;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
    }

    .forgot-pass-btn:hover {
      color: #D4AF37;
      text-decoration: underline;
    }

    .btn-submit-teacher {
      width: 100%;
      padding: 0.95rem;
      background: #123E7C;
      color: #FFFFFF;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 0.975rem;
      letter-spacing: 0.5px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 8px 20px rgba(18, 62, 124, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-submit-teacher:hover {
      background: #0A2852;
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(18, 62, 124, 0.35);
    }

    .teacher-footer-link {
      text-align: center;
      margin-top: 1.5rem;
      padding-top: 1.25rem;
      border-top: 1px solid #F1F5F9;
      font-size: 0.825rem;
      color: #64748B;
    }

    .teacher-footer-link a {
      color: #123E7C;
      font-weight: 600;
      text-decoration: none;
    }

    .teacher-footer-link a:hover {
      color: #D4AF37;
    }

    .form-alert-box {
      padding: 0.85rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 1.25rem;
      display: none;
    }

    .form-alert-box.error {
      background: #FEE2E2;
      color: #991B1B;
      border: 1px solid #FCA5A5;
    }

    .form-alert-box.success {
      background: #D1FAE5;
      color: #065F46;
      border: 1px solid #6EE7B7;
    }
  </style>
</head>
<body class="teacher-login-body">

  <div class="teacher-login-card">
    <div class="teacher-card-header">
      <div class="teacher-crest-wrapper">
        <img src="assets/images/logo.png" alt="His Grace School Crest" class="teacher-crest-img">
      </div>
      <div class="teacher-school-name">His Grace School Agbugburu</div>
      <h1 class="teacher-portal-title">Teacher Portal</h1>
      <p class="teacher-portal-sub">Academic & Class Management System</p>
    </div>

    <div class="teacher-card-body">
      <div id="teacher-login-alert" class="form-alert-box"></div>

      <form id="teacher-login-form" autocomplete="off">
        <div class="form-group">
          <label for="staff-id" class="form-label">Staff ID</label>
          <div class="input-icon-wrapper">
            <input 
              type="text" 
              id="staff-id" 
              class="form-input" 
              placeholder="e.g. HGS/STAFF/001" 
              required
              style="font-family: monospace; font-weight: 600; letter-spacing: 0.5px;"
            >
            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
              <circle cx="8.5" cy="7" r="4"></circle>
              <line x1="20" y1="8" x2="20" y2="14"></line>
              <line x1="23" y1="11" x2="17" y2="11"></line>
            </svg>
          </div>
        </div>

        <div class="form-group">
          <label for="teacher-password" class="form-label">Password</label>
          <div class="input-icon-wrapper">
            <input 
              type="password" 
              id="teacher-password" 
              class="form-input" 
              placeholder="Enter your password" 
              required
            >
            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
          </div>
        </div>

        <div class="form-row-options">
          <label class="remember-me-label">
            <input type="checkbox" id="teacher-remember" checked>
            Remember session
          </label>
          <button type="button" id="btn-forgot-password" class="forgot-pass-btn">Need Help?</button>
        </div>

        <button type="submit" id="btn-teacher-submit" class="btn-submit-teacher">
          <span>Login to Portal</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        </button>
      </form>

      <div class="teacher-footer-link">
        <a href="index.html">&larr; Return to Main Website</a>
      </div>
    </div>
  </div>

  <script type="module" src="js/firebase.js"></script>
  <script type="module" src="js/session.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/teacher-login.js"></script>
</body>
</html>
